name: CI

on:
  push:
    branches: ['**']
  pull_request:

# Cancel superseded runs on the same branch/PR so pushes don't queue behind
# stale CI for commits that no longer matter.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, typecheck, build, unit test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          # Pin to match the packageManager field so CI and local agree.
          version: 11.5.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          # Include pnpm-workspace.yaml in the cache key too — it carries
          # install-affecting settings (allowBuilds), not just the lockfile,
          # so a change to it must invalidate the pnpm store cache.
          cache-dependency-path: |
            pnpm-lock.yaml
            pnpm-workspace.yaml

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint:ci

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Unit tests
        run: pnpm test

  e2e:
    name: End-to-end tests
    needs: verify
    runs-on: ubuntu-latest
    # Testcontainers spins up its own Postgres/RabbitMQ/Redis containers per
    # suite (see test/support/e2e.ts) — ubuntu-latest ships Docker already
    # running, so no services: block is needed here.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          # Pin to match the packageManager field so CI and local agree.
          version: 11.5.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          # Include pnpm-workspace.yaml in the cache key too — it carries
          # install-affecting settings (allowBuilds), not just the lockfile,
          # so a change to it must invalidate the pnpm store cache.
          cache-dependency-path: |
            pnpm-lock.yaml
            pnpm-workspace.yaml

      - run: pnpm install --frozen-lockfile

      - name: E2E tests
        run: pnpm test:e2e

  load-test:
    name: Load test
    needs: verify
    runs-on: ubuntu-latest
    # Push-only: load numbers are noisy on shared PR runners and aren't a
    # merge gate, just a recorded data point (see ops/load-test.ts).
    if: github.event_name == 'push'
    timeout-minutes: 10
    # contents: write lets benchmark-action/github-action-benchmark push the
    # updated trend chart data to the gh-pages branch (main-branch runs only).
    permissions:
      contents: write
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: order_lifecycle
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      rabbitmq:
        image: rabbitmq:4
        ports: ['5672:5672']
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      # benchmark-action/github-action-benchmark expects gh-pages to already
      # exist as an orphan branch — it fetches it but won't create it, so the
      # first-ever run needs this bootstrapped once.
      - name: Ensure gh-pages branch exists
        if: github.ref == 'refs/heads/main'
        run: |
          if ! git ls-remote --exit-code --heads origin gh-pages > /dev/null 2>&1; then
            CURRENT_SHA=$(git rev-parse HEAD)
            git checkout --orphan gh-pages
            git rm -rf . > /dev/null
            git commit --allow-empty -m "chore: initialize gh-pages branch for benchmark trend data"
            git push origin gh-pages
            git checkout "$CURRENT_SHA"
          fi

      - uses: pnpm/action-setup@v4
        with:
          # Pin to match the packageManager field so CI and local agree.
          version: 11.5.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          # Include pnpm-workspace.yaml in the cache key too — it carries
          # install-affecting settings (allowBuilds), not just the lockfile,
          # so a change to it must invalidate the pnpm store cache.
          cache-dependency-path: |
            pnpm-lock.yaml
            pnpm-workspace.yaml

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Start the app
        env:
          NODE_ENV: development
          PORT: '3000'
          DB_HOST: localhost
          DB_PORT: '5432'
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          DB_NAME: order_lifecycle
          RABBITMQ_URL: amqp://guest:guest@localhost:5672
          REDIS_URL: redis://localhost:6379
          JWT_ACCESS_SECRET: ci-load-test-secret
        run: nohup node dist/main > app.log 2>&1 &

      - name: Run load test
        env:
          LOAD_TEST_BASE_URL: http://localhost:3000
          LOAD_TEST_DURATION_SECONDS: '10'
          LOAD_TEST_CONNECTIONS: '20'
          LOAD_TEST_OUTPUT: load-test-results.json
        run: pnpm test:load

      - name: Upload load-test results
        # Upload even when the run flags failures, so the scores are always
        # captured. Skip only if the file was never written (e.g. app crash).
        if: always() && hashFiles('load-test-results.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: load-test-results
          path: load-test-results.json

      - name: Format benchmark data
        if: hashFiles('load-test-results.json') != ''
        run: >-
          pnpm load:format-benchmark load-test-results.json
          load-test-benchmark-throughput.json load-test-benchmark-latency.json

      # Trend charts only track main — feature branches would otherwise churn
      # the gh-pages history with noise that isn't representative of prod.
      - name: Store throughput trend (req/sec, bigger is better)
        if: github.ref == 'refs/heads/main' && hashFiles('load-test-benchmark-throughput.json') != ''
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: customBiggerIsBetter
          output-file-path: load-test-benchmark-throughput.json
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench/throughput
          name: Load test — throughput
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          fail-on-alert: false
          comment-on-alert: true
          alert-threshold: '150%'

      - name: Store latency trend (ms, smaller is better)
        if: github.ref == 'refs/heads/main' && hashFiles('load-test-benchmark-latency.json') != ''
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: customSmallerIsBetter
          output-file-path: load-test-benchmark-latency.json
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench/latency
          name: Load test — latency
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          fail-on-alert: false
          comment-on-alert: true
          alert-threshold: '150%'

      - name: App log
        if: always()
        run: cat app.log || true
