# Local development infrastructure. Tests use Testcontainers and do not need
# this; it's for running the app locally (pnpm start:dev).
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: order_lifecycle
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:4-management
    ports:
      - '5672:5672' # AMQP
      - '15672:15672' # management UI (http://localhost:15672, guest/guest)
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  redis:
    image: redis:7
    ports:
      - '6379:6379' # cache (Epic 4)
    volumes:
      - redis_data:/data

  # Observability stack (Epic 5). Opt-in: `docker compose --profile observability up`.
  # Scrapes the app's /metrics on the host; Grafana is unprovisioned (add a
  # Prometheus datasource at http://prometheus:9090 and build boards by hand).
  prometheus:
    image: prom/prometheus:v2.54.1
    profiles: ['observability']
    ports:
      - '9090:9090'
    volumes:
      - ./ops/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    extra_hosts:
      - 'host.docker.internal:host-gateway'

  grafana:
    image: grafana/grafana:11.2.0
    profiles: ['observability']
    ports:
      - '3001:3000' # UI on 3001 (the app owns 3000); login admin/admin
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: 'true'
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  # Trace backend (Epic 5.4). Point the app at it with
  # OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4318; UI at http://localhost:16686.
  jaeger:
    image: jaegertracing/all-in-one:1.60
    profiles: ['observability']
    environment:
      COLLECTOR_OTLP_ENABLED: 'true'
    ports:
      - '16686:16686' # Jaeger UI
      - '4318:4318' # OTLP/HTTP receiver

volumes:
  postgres_data:
  rabbitmq_data:
  redis_data:
  prometheus_data:
  grafana_data:
